<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>設定</title>
    <meta name="description" content="ツール共通設定ページです。">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23ef4444'/%3E%3Ccircle cx='16' cy='16' r='4' fill='white'/%3E%3Cpath d='M1 16h30' stroke='white' stroke-width='3'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./poketools-custom-styles.css">
  </head>
  <body class="calc-page settings-page">
    <header class="calc-header py-2"><div class="container"></div></header>

    <main class="container py-3 px-3 px-lg-4">
      <section class="card panel-card">
        <div class="card-header d-flex align-items-center gap-2">
          <i class="bi bi-gear-fill"></i>
          <span id="settings-title">設定</span>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-12 col-lg-6">
              <label class="form-label d-inline-flex align-items-center gap-2" for="setting-language" id="setting-language-label"><i class="bi bi-translate"></i><span>言語</span></label>
              <select id="setting-language" class="form-select">
                <option value="ja">日本語</option>
                <option value="en">English</option>
              </select>
            </div>
            <div class="col-12 col-lg-6">
              <label class="form-label d-inline-flex align-items-center gap-2" for="setting-regulation" id="setting-regulation-label"><i class="bi bi-list-ul"></i><span>レギュレーション</span></label>
              <select id="setting-regulation" class="form-select">
                <option value="M-A">MA-1</option>
              </select>
            </div>
            <div class="col-12">
              <div class="settings-row-switch d-flex align-items-center justify-content-between gap-2">
                <label id="setting-double-battle-label" class="form-label mb-0 d-inline-flex align-items-center gap-2" for="setting-double-battle"><i class="bi bi-people-fill"></i><span>ダブルバトル用</span></label>
                <div class="form-check form-switch m-0">
                  <input id="setting-double-battle" class="form-check-input" type="checkbox">
                </div>
              </div>
            </div>
            <div class="col-12">
              <hr class="my-1">
            </div>
            <div class="col-12">
              <label class="form-label d-inline-flex align-items-center gap-2" id="setting-google-link-label"><i class="bi bi-google"></i><span>Google連携（ボックス保存/読込）</span></label>
              <div class="d-flex flex-wrap gap-2 mt-2">
                <button id="setting-google-signin" class="btn btn-outline-secondary" type="button"><i class="bi bi-box-arrow-in-right"></i> 連携</button>
                <button id="setting-google-signout" class="btn btn-outline-secondary" type="button"><i class="bi bi-box-arrow-right"></i> 解除</button>
                <button id="setting-google-save" class="btn btn-outline-primary" type="button"><i class="bi bi-cloud-upload"></i> Driveへ保存</button>
                <button id="setting-google-load" class="btn btn-outline-primary" type="button"><i class="bi bi-cloud-download"></i> Driveから読込</button>
              </div>
              <div id="setting-google-account" class="small text-muted mt-2"></div>
              <div id="setting-google-status" class="small text-muted mt-1"></div>
            </div>
            <div class="col-12">
              <div id="settings-saved" class="small text-muted"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./script-poketools-layout.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="./script-settings.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>図鑑詳細</title>
    <meta name="description" content="ポケモン詳細図鑑ページです。">
    <link rel="shortcut icon" href="/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/pokelist.css">
    <link rel="stylesheet" href="/css/pokedex.css">
    <link rel="stylesheet" href="/css/poketools-common.css">
    <link rel="stylesheet" href="/css/tailwind-bootstrap-bridge.css">
  </head>
  <body class="pokedex-page">
    <header class="calc-header py-2">
      <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
          <p class="calc-title mb-0">ポケモンチャンピオンズ ツール</p>
          <p class="calc-subtitle mb-0" id="dex-detail-title" data-i18n="detailSubtitle">Pokemon details</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <div class="d-flex flex-wrap gap-2 dex-quicklinks">
            <a class="btn btn-outline-secondary btn-sm" href="/pokelist/pokedex.html"><i class="bi bi-search"></i><span>図鑑</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/pokelist/box-party.html"><i class="bi bi-box-seam"></i><span>ボックス</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/pokelist/damage-calc.html"><i class="bi bi-calculator"></i><span>ダメージ計算</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/pokelist/speed-adjust.html"><i class="bi bi-speedometer2"></i><span>素早さ比較</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/pokelist/index.html"><i class="bi bi-arrow-repeat"></i><span>レギュレーション変更</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/pokelist/damage-calc.html#settings-panel-col"><i class="bi bi-gear"></i><span>設定</span></a>
          </div>
          <ul class="nav nav-tabs lang-tabs" id="lang-tabs">
            <li class="nav-item"><button class="nav-link active" data-lang="ja" type="button">日本語</button></li>
            <li class="nav-item"><button class="nav-link" data-lang="en" type="button">English</button></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="container-fluid py-3 px-3 px-xxl-4">
      <div class="row g-3 align-items-start pokedex-detail-shell">
        <aside class="col-12 col-xxl-2">
          <div class="ad-stack sticky-xxl-top pt-xxl-2">
            <div class="ad-slot ad-rail d-none d-xxl-flex" aria-label="left-ad-rail">AD 160x600</div>
          </div>
        </aside>
        <section class="col-12 col-xxl-8">
          <div class="row g-3 align-items-start">
        <section class="col-12 col-xl-5">
          <section class="card panel-card mb-3">
            <div class="card-body">
              <div class="dex-detail-head">
                <img id="dex-detail-icon" class="ps-pokemon-icon dex-detail-icon" src="" alt="" loading="lazy">
                <div>
                  <div id="dex-detail-name" class="dex-detail-name">-</div>
                  <div id="dex-detail-meta" class="dex-detail-meta">-</div>
                </div>
              </div>
              <div id="dex-type-list" class="dex-type-list mt-2"></div>
              <div class="d-flex flex-wrap gap-2 mt-3">
                <button id="dex-add-box" class="btn btn-outline-secondary btn-sm" type="button" data-i18n="addToBox">ボックス追加</button>
              </div>
            </div>
          </section>

          <section class="card panel-card mb-3">
            <div class="card-header" data-i18n="stats">種族値</div>
            <div class="card-body">
              <div id="dex-stats" class="dex-stats-grid"></div>
            </div>
          </section>

          <section class="card panel-card mb-3">
            <div class="card-header" data-i18n="actualStats">実数値目安</div>
            <div class="card-body">
              <div id="dex-actual-stats" class="dex-actual-grid"></div>
            </div>
          </section>

          <section class="card panel-card">
            <div class="card-header" data-i18n="abilities">特性</div>
            <div class="card-body">
              <div id="dex-abilities" class="d-flex flex-wrap gap-2"></div>
            </div>
          </section>
        </section>

        <section class="col-12 col-xl-7">
          <section class="card panel-card mb-3">
            <div class="card-header" data-i18n="evolution">進化・関連フォルム</div>
            <div class="card-body">
              <div id="dex-evolution" class="d-flex flex-wrap gap-2"></div>
            </div>
          </section>

          <section class="card panel-card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span data-i18n="moves">覚える技</span>
              <input id="dex-move-search" class="form-control form-control-sm dex-move-search" type="search" placeholder="技を検索" data-i18n-placeholder="moveSearch">
            </div>
            <div class="card-body">
              <div id="dex-moves" class="dex-move-grid"></div>
            </div>
          </section>
        </section>
          </div>
        </section>
        <aside class="col-12 col-xxl-2">
          <div class="ad-stack sticky-xxl-top pt-xxl-2">
            <div class="ad-slot ad-rail d-none d-xxl-flex" aria-label="right-ad-rail">AD 160x600</div>
          </div>
        </aside>
      </div>
      <div class="ad-mobile-grid d-xxl-none mt-3">
        <div class="ad-slot ad-mobile-banner" aria-label="mobile-banner-320x100">AD 320x100</div>
      </div>
    </main>

    <script src="/pokelist/script-poketools-layout.js"></script>
    <script src="/pokelist/script-tailwind-modal-shim.js"></script>
    <script src="/pokelist/script-pokedex-pokemon.js"></script>
  </body>
</html>

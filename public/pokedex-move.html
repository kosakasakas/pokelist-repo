<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>わざ詳細</title>
    <meta name="description" content="わざの詳細図鑑ページです。">
    <link rel="shortcut icon" href="/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/poketools-custom-styles.css">
  </head>
  <body class="pokedex-page">
    <header class="calc-header py-2">
      <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
          <p class="calc-title mb-0">ポケモンチャンピオンズ ツール</p>
          <p class="calc-subtitle mb-0" id="detail-page-title">わざの説明と習得ポケモン</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <div class="d-flex flex-wrap gap-2 dex-quicklinks">
            <a class="btn btn-outline-secondary btn-sm" href="/pokedex.html"><i class="bi bi-search"></i><span>図鑑</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/box-party.html"><i class="bi bi-box-seam"></i><span>ボックス</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/damage-calc.html"><i class="bi bi-calculator"></i><span>ダメージ計算</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/speed-adjust.html"><i class="bi bi-speedometer2"></i><span>素早さ比較</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/index.html"><i class="bi bi-arrow-repeat"></i><span>レギュレーション変更</span></a>
            <a class="btn btn-outline-secondary btn-sm" href="/damage-calc.html#settings-panel-col"><i class="bi bi-gear"></i><span>設定</span></a>
          </div>
          <ul class="nav nav-tabs lang-tabs" id="lang-tabs">
            <li class="nav-item"><button class="nav-link active" data-lang="ja" type="button">日本語</button></li>
            <li class="nav-item"><button class="nav-link" data-lang="en" type="button">English</button></li>
          </ul>
        </div>
      </div>
    </header>

    <main class="container-fluid py-3 px-3 px-xxl-4">
      <div class="row g-3 align-items-start pokedex-detail-shell">
        <aside class="col-12 col-xxl-2">
          <div class="ad-stack sticky-xxl-top pt-xxl-2">
            <div class="ad-slot ad-rail d-none d-xxl-flex" aria-label="left-ad-rail">AD 160x600</div>
          </div>
        </aside>
        <section class="col-12 col-xxl-8">
          <div id="detail-root"></div>
        </section>
        <aside class="col-12 col-xxl-2">
          <div class="ad-stack sticky-xxl-top pt-xxl-2">
            <div class="ad-slot ad-rail d-none d-xxl-flex" aria-label="right-ad-rail">AD 160x600</div>
          </div>
        </aside>
      </div>
      <div class="ad-mobile-grid d-xxl-none mt-3">
        <div class="ad-slot ad-mobile-banner" aria-label="mobile-banner-320x100">AD 320x100</div>
      </div>
    </main>

    <script>
      document.body.dataset.detailKind = 'move';
    </script>
    <script src="/script-poketools-layout.js"></script>
    <script src="/script-ads.js"></script>
    <script src="/script-dex-detail.js"></script>
  </body>
</html>

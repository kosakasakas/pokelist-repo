<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>ポケモンチャンピオンズ ボックス/パーティ</title>
    <meta name="description" content="ポケモンチャンピオンズ用のボックス/パーティ管理ページです。">
    <link rel="shortcut icon" href="./favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./poketools-custom-styles.css">
  </head>
  <body class="calc-page box-party-page">
    <header class="calc-header py-2"><div class="container"></div></header>

    <main class="container-fluid py-3 px-3 px-xxl-4">
      <div class="row g-3 align-items-start calc-shell box-party-shell">
        <aside class="col-xxl-2 d-none d-xxl-block">
          <div class="ad-stack">
            <div class="ad-slot ad-rail" aria-label="left-ad-rail">AD 160x600</div>
          </div>
        </aside>

        <section class="col-12 col-xxl-8">
          <section class="card panel-card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span data-i18n="boxPartyLabel">ボックス / パーティ</span>
            </div>
            <div class="card-body">
              <div class="row g-3">
                <div id="box-panel-col" class="col-12 col-xl-7">
                  <div class="manager-panel box-panel h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                      <div class="section-title manager-section-title" title="右クリックまたは長押しでコピーできます">
                        <i class="bi bi-box-seam" aria-hidden="true"></i>
                        <span>ボックス</span>
                      </div>
                      <div class="d-flex align-items-center gap-2">
                        <button id="add-box-pokemon" class="btn btn-outline-secondary btn-sm manager-plus-button" type="button" title="ボックスに新規追加" aria-label="ボックスに新規追加">
                          <i class="bi bi-plus-lg" aria-hidden="true"></i>
                        </button>
                        <span class="badge rounded-pill text-bg-light" id="box-count-badge">0</span>
                      </div>
                    </div>
                    <div id="box-list" class="entity-list"></div>
                  </div>
                </div>
                <div id="party-panel-col" class="col-12 col-xl-5">
                  <div class="manager-panel party-panel h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                      <div class="section-title manager-section-title" title="ボックスからドラッグ&ドロップで登録できます">
                        <i class="bi bi-people" aria-hidden="true"></i>
                        <span>パーティ</span>
                      </div>
                      <div class="d-flex align-items-center gap-2">
                        <button id="add-party" class="btn btn-outline-secondary btn-sm manager-plus-button" type="button" title="パーティ追加" aria-label="パーティ追加">
                          <i class="bi bi-plus-lg" aria-hidden="true"></i>
                        </button>
                        <span class="badge rounded-pill text-bg-light" id="party-count-badge">0</span>
                      </div>
                    </div>
                    <div id="party-list" class="party-list"></div>
                  </div>
                </div>
              </div>
            </div>
          </section>

        </section>

        <aside class="col-xxl-2 d-none d-xxl-block">
          <div class="ad-stack">
            <div class="ad-slot ad-rail" aria-label="right-ad-rail">AD 160x600</div>
          </div>
        </aside>
      </div>
    </main>

    <div class="modal fade" id="picker-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="picker-title">-</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <ul class="nav nav-pills picker-source-tabs mb-2 d-none" id="picker-source-tabs">
              <li class="nav-item"><button class="nav-link active" data-source="list" type="button">リスト検索</button></li>
              <li class="nav-item"><button class="nav-link" data-source="box" type="button">ボックス検索</button></li>
              <li class="nav-item"><button class="nav-link" data-source="party" type="button">パーティ検索</button></li>
              <li class="nav-item"><button class="nav-link" data-source="linked" type="button">連携わざ</button></li>
            </ul>
            <input id="picker-search" class="form-control mb-2" type="search" placeholder="Search">
            <div id="picker-create-actions" class="mb-2 d-none"></div>
            <div id="picker-list" class="picker-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="pokemon-detail-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="pokemon-detail-title">ポケモン編集</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input id="detail-pokemon-id" type="hidden">
            <div class="detail-head mb-3 d-flex align-items-center gap-2 flex-nowrap">
              <span class="pokemon-icon-stack" id="detail-head-icon"></span>
              <div class="detail-head-main flex-grow-1">
                <div class="detail-head-title-row d-flex align-items-center gap-2 flex-nowrap">
                  <input id="detail-nickname" class="form-control" type="text" maxlength="30" placeholder="ニックネーム" title="ニックネームを編集">
                  <div class="detail-mega-switch" title="メガ進化" aria-label="メガ進化">
                    <input id="detail-mega-enabled" type="checkbox" hidden>
                    <button id="detail-mega-toggle" class="btn detail-mega-toggle" type="button" aria-pressed="false">メガ</button>
                  </div>
                </div>
                <div class="detail-head-species-row">
                  <div class="detail-head-title" id="detail-head-name">-</div>
                  <div class="detail-head-sub" id="detail-head-meta">-</div>
                </div>
                <div class="detail-head-base-row">
                  <div class="detail-head-base-stats mono" id="detail-head-base-stats">H- A- B- C- D- S-</div>
                  <div class="detail-head-base-total mono" id="detail-head-base-total">合計 -</div>
                </div>
              </div>
            </div>
            <div class="detail-layout">
              <section class="detail-table-section">
                <div class="detail-section-title">個体情報</div>
                <div class="row g-2">
                  <div class="col-12 col-sm-6 detail-field-group" title="ポケモン種族を選択">
                    <span class="detail-field-icon"><i class="bi bi-person"></i></span>
                    <input id="detail-species" type="hidden">
                    <button id="detail-species-button" class="btn btn-outline-secondary w-100 text-start" type="button"></button>
                  </div>
                  <div class="col-12 col-sm-6 detail-field-group" title="とくせいを選択">
                    <span class="detail-field-icon"><i class="bi bi-lightning-charge"></i></span>
                    <input id="detail-ability" type="hidden">
                    <button id="detail-ability-button" class="btn btn-outline-secondary w-100 text-start" type="button"></button>
                  </div>
                  <div class="col-12 col-sm-6 detail-field-group" title="せいかくを選択">
                    <span class="detail-field-icon"><i class="bi bi-emoji-smile"></i></span>
                    <input id="detail-nature" type="hidden">
                    <button id="detail-nature-button" class="btn btn-outline-secondary w-100 text-start" type="button"></button>
                  </div>
                  <div class="col-12 col-sm-6 detail-field-group" title="もちものを選択">
                    <span class="detail-field-icon"><i class="bi bi-bag"></i></span>
                    <input id="detail-item" type="hidden">
                    <button id="detail-item-button" class="btn btn-outline-secondary w-100 text-start" type="button"></button>
                  </div>
                </div>
              </section>

              <section class="detail-table-section">
                <div class="detail-section-title">ステータス</div>
                <div class="detail-stat-actions-layout">
                  <div class="detail-compact-stat-editor">
                    <div class="detail-compact-stat-row">
                      <span class="mono detail-stat-label">H</span><span class="mono compact-stat-value" id="detail-stat-hp">-</span><button class="btn btn-outline-secondary btn-sm stat-mod-cycle-btn" type="button" data-side="detail" data-stat="hp" data-state="neutral" disabled>±0%</button><select id="detail-ev-hp" class="form-select mono compact-stat-input detail-ev-select"></select>
                    </div>
                    <div class="detail-compact-stat-row">
                      <span class="mono detail-stat-label">A</span><span class="mono compact-stat-value" id="detail-stat-atk">-</span><button class="btn btn-outline-secondary btn-sm stat-mod-cycle-btn" type="button" data-side="detail" data-stat="atk" data-state="neutral">±0%</button><select id="detail-ev-atk" class="form-select mono compact-stat-input detail-ev-select"></select>
                    </div>
                    <div class="detail-compact-stat-row">
                      <span class="mono detail-stat-label">B</span><span class="mono compact-stat-value" id="detail-stat-def">-</span><button class="btn btn-outline-secondary btn-sm stat-mod-cycle-btn" type="button" data-side="detail" data-stat="def" data-state="neutral">±0%</button><select id="detail-ev-def" class="form-select mono compact-stat-input detail-ev-select"></select>
                    </div>
                    <div class="detail-compact-stat-row">
                      <span class="mono detail-stat-label">C</span><span class="mono compact-stat-value" id="detail-stat-spa">-</span><button class="btn btn-outline-secondary btn-sm stat-mod-cycle-btn" type="button" data-side="detail" data-stat="spa" data-state="neutral">±0%</button><select id="detail-ev-spa" class="form-select mono compact-stat-input detail-ev-select"></select>
                    </div>
                    <div class="detail-compact-stat-row">
                      <span class="mono detail-stat-label">D</span><span class="mono compact-stat-value" id="detail-stat-spd">-</span><button class="btn btn-outline-secondary btn-sm stat-mod-cycle-btn" type="button" data-side="detail" data-stat="spd" data-state="neutral">±0%</button><select id="detail-ev-spd" class="form-select mono compact-stat-input detail-ev-select"></select>
                    </div>
                    <div class="detail-compact-stat-row">
                      <span class="mono detail-stat-label">S</span><span class="mono compact-stat-value" id="detail-stat-spe">-</span><button class="btn btn-outline-secondary btn-sm stat-mod-cycle-btn" type="button" data-side="detail" data-stat="spe" data-state="neutral">±0%</button><select id="detail-ev-spe" class="form-select mono compact-stat-input detail-ev-select"></select>
                    </div>
                  </div>
                </div>
                <div id="detail-ev-warning" class="iv-warning mt-2"><i class="bi bi-exclamation-triangle-fill"></i><span>能力ポイントの合計が上限を超えています</span></div>
                <div id="detail-ev-remaining" class="small text-muted mt-1">残り能力ポイント: 66</div>
                <div id="detail-nature-warning" class="small text-muted mt-1 d-none"><i class="bi bi-exclamation-triangle-fill"></i> 性格補正が不正です（+と-をそれぞれ1つずつ、または両方なし）</div>
                <div class="detail-adjust-buttons d-grid gap-2">
                  <button id="detail-apply-attacker" class="btn btn-outline-danger btn-sm detail-wide-square-btn" type="button"><i class="bi bi-bullseye"></i><span>攻撃調整</span></button>
                  <button id="detail-apply-defender" class="btn btn-outline-info btn-sm detail-wide-square-btn" type="button"><i class="bi bi-shield"></i><span>防御調整</span></button>
                  <button id="detail-apply-speed" class="btn btn-outline-secondary btn-sm detail-wide-square-btn" type="button" title="素早さ調整"><i class="bi bi-speedometer2"></i><span>素早さ調整</span></button>
                </div>
              </section>

              <section class="detail-table-section">
                <div class="detail-section-title">わざ</div>
                <div class="detail-move-list" id="detail-move-list"></div>
              </section>

              <div class="detail-warning-list small" id="detail-warning-list"></div>

              <section class="detail-table-section">
                <div class="detail-section-title">メモ</div>
                <div class="detail-memo-panel">
                  <div class="small text-muted mb-1">与ダメージ調整</div>
                  <div id="detail-calc-history-attacker" class="calc-history-list mb-2"></div>
                  <div class="small text-muted mb-1">被ダメージ調整</div>
                  <div id="detail-calc-history-defender" class="calc-history-list mb-2"></div>
                  <hr class="my-2">
                  <div class="small text-muted mb-1">素早さ調整</div>
                  <div id="detail-speed-memo" class="calc-history-list mb-2"></div>
                  <div class="small text-muted mb-1">その他</div>
                  <textarea id="detail-notes-other" class="form-control" rows="3" maxlength="500"></textarea>
                </div>
              </section>
            </div>
          </div>
          <div class="modal-footer justify-content-between">
            <div></div>
            <div class="d-flex gap-2 detail-footer-actions">
              <button id="detail-delete" class="btn btn-outline-secondary px-4" type="button">削除</button>
              <button id="detail-save" class="btn btn-primary px-4" type="button">保存</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./script-poketools-layout.js"></script>
    <script src="./script-ads.js"></script>
    <script src="./script-damage-calc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  </body>
</html>

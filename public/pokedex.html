<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>図鑑</title>
    <meta name="description" content="ポケモン、わざ、とくせいをひとつの検索窓で探す図鑑ページです。">
    <link rel="shortcut icon" href="./favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./poketools-custom-styles.css">
  </head>
  <body class="pokedex-browser-page">
    <header class="calc-header py-2"><div class="container"></div></header>

    <main class="container-fluid py-3 px-3 px-xxl-4">
      <div class="row g-3 align-items-start pokedex-detail-shell">
        <aside class="col-12 col-xxl-2">
          <div class="ad-stack sticky-xxl-top pt-xxl-2">
            <div class="ad-slot ad-rail d-none d-xxl-flex" aria-label="left-ad-rail">AD 160x600</div>
          </div>
        </aside>
        <section class="col-12 col-xxl-8">
          <section class="card panel-card dex-browser-shell">
            <div class="card-body">
              <div class="row g-2 align-items-center mb-3">
                <div class="col-12 col-xl-7">
                  <div class="input-group input-group-lg dex-search-group">
                    <input id="dex-search" class="form-control" type="search" data-i18n-placeholder="searchPlaceholderPokemon" placeholder="ポケモン名で検索" autocomplete="off">
                    <button class="btn btn-outline-secondary" type="button" id="dex-search-clear">×</button>
                  </div>
                </div>
                <div class="col-12 col-xl-5 text-xl-end">
                  <span id="dex-result-count" class="badge text-bg-light dex-result-count">-</span>
                </div>
              </div>

              <ul class="nav nav-tabs dex-tabs mb-3" role="tablist">
                <li class="nav-item" role="presentation"><button class="nav-link active" type="button" data-tab="all" data-i18n="tabAll">全データ</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" type="button" data-tab="pokemon" data-i18n="tabPokemon">ポケモン</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" type="button" data-tab="move" data-i18n="tabMove">わざ</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" type="button" data-tab="ability" data-i18n="tabAbility">とくせい</button></li>
                <li class="nav-item" role="presentation"><button class="nav-link" type="button" data-tab="item" data-i18n="tabItem">どうぐ</button></li>
              </ul>

              <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                <h2 class="h5 mb-0" id="dex-results-title" data-i18n="resultsTitle">検索結果</h2>
                <span class="text-muted small">Enter で検索更新</span>
              </div>

              <div id="dex-results" class="dex-results"></div>
            </div>
          </section>
        </section>
        <aside class="col-12 col-xxl-2">
          <div class="ad-stack sticky-xxl-top pt-xxl-2">
            <div class="ad-slot ad-rail d-none d-xxl-flex" aria-label="right-ad-rail">AD 160x600</div>
          </div>
        </aside>
      </div>
      <div class="ad-mobile-grid d-xxl-none mt-3">
        <div class="ad-slot ad-mobile-banner" aria-label="mobile-banner-320x100">AD 320x100</div>
      </div>
    </main>

    <script src="./script-poketools-layout.js"></script>
    <script src="./script-ads.js"></script>
    <script src="./script-dex-browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  </body>
</html>

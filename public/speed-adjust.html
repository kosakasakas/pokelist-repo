<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>素早さ調整</title>
    <meta name="description" content="レギュレーション対応の素早さ調整ページです。">
    <link rel="shortcut icon" href="/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/pokelist/poketools-custom-styles.css">
    <style>
      html, body {
        height: 100%;
        overflow: hidden; /* ページ全体のスクロールを禁止 */
      }
      .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .table-container {
        flex-grow: 1;
        overflow-y: auto; /* このコンテナがスクロールする */
      }
      #speed-table thead th {
        position: sticky;
        top: 0;
        z-index: 10;
      }
      @media (max-width: 576px) {
        th[data-i18n="speedValue"],
        th[data-i18n="groupList"] {
          font-size: 0.8rem;
          white-space: nowrap;
        }
      }
      .highlight-row {
        animation: highlight-animation 1.5s;
      }
      @keyframes highlight-animation {
        from { background-color: #aee2ff; }
        to { background-color: transparent; }
      }
    </style>
  </head>
  <body class="speed-adjust-page d-flex flex-column">
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
          <a class="navbar-brand" href="/pokelist/index.html">ポケモンチャンピオンズ ツール</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#speed-adjust-navbar-collapse" aria-controls="speed-adjust-navbar-collapse" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="speed-adjust-navbar-collapse">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item"><a class="nav-link" href="/pokelist/pokedex.html">図鑑</a></li>
              <li class="nav-item"><a class="nav-link" href="/pokelist/box-party.html">ボックス</a></li>
              <li class="nav-item"><a class="nav-link" href="/pokelist/damage-calc.html">ダメージ計算</a></li>
              <li class="nav-item"><a class="nav-link" href="/pokelist/speed-adjust.html">素早さ比較</a></li>
              <li class="nav-item"><a class="nav-link" href="/pokelist/index.html">レギュレーション変更</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container-fluid py-3 px-3 px-xxl-4 main-content">
      <div class="row g-3 align-items-start calc-shell h-100">
        <aside class="col-xxl-2 d-none d-xxl-block">
          <div class="ad-stack">
            <div class="ad-slot ad-rail" aria-label="left-ad-rail">AD 160x600</div>
          </div>
        </aside>

        <section class="col-12 col-xxl-8 d-flex flex-column h-100">
          <section class="speed-filter-bar mb-2 bg-light py-2">
            <div class="row g-2 align-items-end">
              <div class="col-12">
                <input id="speed-search" class="form-control" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="ポケモン名で検索">
              </div>
            </div>
          </section>

          <div class="table-container">
            <table class="table table-hover table-striped align-middle" id="speed-table">
              <thead>
                <tr>
                  <th scope="col" data-i18n="speedValue" class="bg-light"><i class="bi bi-speedometer2"></i> 実数値</th>
                  <th scope="col" data-i18n="groupList" class="bg-light">対象群</th>
                </tr>
              </thead>
              <tbody id="speed-table-body"></tbody>
            </table>
            <footer class="text-center py-4">
              <p class="text-muted small">
                Data source: Pokemon Showdown<br>
                Pokemon and related names are trademarks of Nintendo, Creatures, and GAME FREAK.<br>
                &copy; 2026 sakas_poke
              </p>
            </footer>
          </div>
        </section>

        <aside class="col-xxl-2 d-none d-xxl-block">
          <div class="ad-stack">
            <div class="ad-slot ad-rail" aria-label="right-ad-rail">AD 160x600</div>
          </div>
        </aside>
      </div>
    </main>

    <aside class="speed-target-panel fixed-bottom bg-body-tertiary p-3 shadow-lg" id="speed-target-panel">
      <div class="speed-target-main container">
        <div class="row g-2 align-items-center">
          <!-- 1段目 -->
          <div class="col-12 col-md-6">
            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary w-100" id="target-picker-trigger" type="button" data-bs-toggle="tooltip" title="調整するポケモンを選択">
                <span data-i18n="loadingTarget">調整対象を読み込み中...</span>
              </button>
              <button id="target-edit-detail" class="btn btn-outline-secondary" type="button" data-bs-toggle="tooltip" data-i18n-title="editPokemon" title="詳細編集">
                <i class="bi bi-pencil-square"></i>
              </button>
            </div>
          </div>
          <div class="col-12 col-md-6">
             <div class="btn-group w-100">
                <div class="speed-mega-toggle-wrap" data-bs-toggle="tooltip" data-i18n-title="megaEvolution" title="メガ進化" aria-label="メガ進化">
                    <input id="target-mega-enabled" type="checkbox" hidden>
                    <button id="target-mega-toggle" class="btn btn-outline-secondary" type="button" aria-pressed="false">メガ</button>
                </div>
                <button id="target-scarf" class="btn btn-outline-secondary speed-scarf-toggle" type="button" data-bs-toggle="tooltip" data-i18n-title="scarf" title="こだわりスカーフ" aria-pressed="false"></button>
              </div>
          </div>
          <!-- 2段目 -->
          <div class="col-6 col-sm-3">
              <div class="text-center">
                <span class="fs-4 fw-bold mono" id="target-current-speed">-</span>
                <small class="text-muted d-block" data-i18n-title="speedValue">実数値</small>
              </div>
          </div>
          <div class="col-6 col-sm-3">
            <button id="target-nature-cycle" class="btn btn-outline-secondary w-100" type="button" data-bs-toggle="tooltip" data-i18n-title="naturePlus" title="性格補正を切替">
              <i class="bi bi-emoji-smile"></i>
              <span id="target-nature-cycle-text">±0%</span>
            </button>
          </div>
          <!-- 3段目 -->
          <div class="col-6 col-sm-3">
              <div class="input-group" data-bs-toggle="tooltip" data-i18n-title="apLabel" title="能力ポイント">
                <span class="input-group-text"><i class="bi bi-lightning-charge"></i></span>
                <select id="target-spe-ap" class="form-select"></select>
              </div>
          </div>
          <div class="col-6 col-sm-3">
            <div class="input-group" data-bs-toggle="tooltip" data-i18n-title="rankLabel" title="ランク">
              <span class="input-group-text"><i class="bi bi-graph-up-arrow"></i></span>
              <select id="target-spe-rank" class="form-select"></select>
            </div>
          </div>
          <!-- 4段目 -->
          <div class="col-12">
            <div class="d-grid">
              <button id="speed-save-only" class="btn btn-primary" type="button">
                <i class="bi bi-save"></i>
                <span data-i18n="save">個体を保存</span>
              </button>
            </div>
          </div>
        </div>
        <div id="speed-save-feedback" class="speed-save-feedback" role="status" aria-live="polite"></div>
      </div>
    </aside>

    <div class="modal fade" id="target-search-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" data-i18n="targetSearchTitle">対象ポケモンを検索</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="btn-group w-100 mb-2" role="group" id="target-search-scope">
              <button type="button" class="btn btn-outline-secondary active" data-scope="all" data-i18n="allList">全リスト</button>
              <button type="button" class="btn btn-outline-secondary" data-scope="box" data-i18n="boxList">ボックス</button>
              <button type="button" class="btn btn-outline-secondary" data-scope="party" data-i18n="partyList">パーティ</button>
            </div>
            <input id="target-search-input" class="form-control mb-2" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="ポケモン名で検索">
            <div id="target-search-list" class="target-search-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="target-box-editor-host" class="target-box-editor-host d-none" aria-hidden="true">
      <div class="target-box-editor-surface">
        <iframe id="target-box-editor-frame" class="target-box-editor-frame" src="about:blank" title="ボックス編集"></iframe>
      </div>
    </div>

    <script src="/pokelist/script-poketools-layout.js"></script>
    <script src="/pokelist/script-tailwind-modal-shim.js"></script>
    <script src="/pokelist/script-speed-adjust-v2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  </body>
</html>

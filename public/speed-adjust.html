<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <script>document.documentElement.classList.add('tool-page-loading');</script>
    <title>素早さ調整</title>
    <meta name="description" content="レギュレーション対応の素早さ調整ページです。">
    <link rel="shortcut icon" href="./favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="preconnect" href="https://play.pokemonshowdown.com" crossorigin>
    <link rel="dns-prefetch" href="https://play.pokemonshowdown.com">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./poketools-custom-styles.css">
    <style>
      html, body {
        height: 100%;
        overflow: hidden; /* ページ全体のスクロールを禁止 */
      }
      body.speed-adjust-page {
        --speed-target-panel-height: 0px;
        --speed-list-max-height: 50vh;
      }
      .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .speed-panel-grid {
        min-height: 0;
        height: 100%;
      }
      .speed-list-panel,
      .speed-target-card {
        min-height: 0;
      }
      .speed-list-panel .card-body {
        padding: 0;
        display: block;
      }
      .speed-target-card .card-body {
        padding: 1rem;
      }
      .speed-panel-title {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-weight: 700;
        min-width: 0;
      }
      .speed-panel-title i {
        color: #334155;
      }
      .speed-panel-grid {
        row-gap: 0 !important;
      }
      .speed-panel-grid > [class*="col-"] {
        padding-top: 0;
        padding-bottom: 0;
      }
      .speed-list-panel {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
      .speed-target-card {
        margin-top: -1px;
      }
      .speed-list-tools {
        width: min(100%, 18rem);
        flex: 1 1 12rem;
        min-width: 9.5rem;
      }
      .speed-list-tools .form-control {
        border-radius: 0.75rem;
        min-width: 0;
      }
      .table-container {
        overflow-y: auto; /* このコンテナがスクロールする */
        min-height: 0;
        padding-bottom: 0;
        max-height: var(--speed-list-max-height);
      }
      #speed-table {
        margin-bottom: 0;
      }
      #speed-table tbody td {
        vertical-align: top;
      }
      #speed-table tbody td:first-child {
        width: 4.9rem;
        text-align: center;
        white-space: nowrap;
        font-weight: 700;
        color: #0f172a;
      }
      .speed-group-stack {
        display: grid;
        gap: 0.42rem;
      }
      .speed-group {
        display: flex;
        align-items: flex-start;
        gap: 0.45rem;
      }
      .speed-group-label {
        min-width: 5.3rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.28rem;
        padding: 0.38rem 0.55rem;
        font-size: 0.74rem;
      }
      .speed-chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 0.62rem;
        min-width: 0;
        padding-right: 0.2rem;
        padding-bottom: 0.2rem;
      }
      .speed-pokemon-cell {
        width: 40px;
        height: 40px;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 40px;
        border-radius: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: linear-gradient(180deg, #f8fafc, #eef2ff);
        overflow: visible;
        margin-right: 0.1rem;
        margin-bottom: 0.1rem;
      }
      .speed-icon-link {
        width: 100%;
        height: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .speed-pokemon-cell .ps-pokemon-icon {
        width: 34px;
        height: 34px;
        object-fit: contain;
      }
      .speed-rule-badges {
        position: absolute;
        right: 1px;
        bottom: 1px;
        display: inline-flex;
        align-items: center;
        gap: 0.14rem;
        z-index: 2;
      }
      .speed-rule-badges .badge {
        padding: 0.12rem 0.18rem;
        line-height: 1;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.14);
      }
      .speed-rule-badges .badge .ps-item-icon {
        width: 10px;
        height: 10px;
        flex: 0 0 10px;
        vertical-align: middle;
      }
      .speed-group-scarf-icon {
        width: 16px;
        height: 16px;
      }
      .speed-self-row td {
        background: rgba(254, 226, 226, 0.5);
      }
      .speed-self-chip {
        background: linear-gradient(180deg, #fee2e2, #fecaca);
        border-color: rgba(239, 68, 68, 0.28);
        border-width: 2px;
      }
      @media (max-width: 576px) {
        .speed-list-tools {
          width: auto;
          flex: 1 1 0;
          min-width: 0;
        }

        .speed-list-panel .card-header {
          flex-wrap: nowrap !important;
          gap: 0.4rem !important;
          padding-left: 0.6rem;
          padding-right: 0.6rem;
        }

        .speed-list-panel .card-header .speed-panel-title {
          white-space: nowrap;
          font-size: 0.84rem;
        }

        #speed-search {
          font-size: 0.76rem;
          padding-left: 0.45rem;
          padding-right: 0.45rem;
        }
      }
      .highlight-row td,
      .speed-focus-row td {
        animation: speed-self-row-highlight 1.25s linear infinite alternate;
      }
      @keyframes speed-self-row-highlight {
        0% { background-color: rgba(254, 226, 226, 0.42); }
        100% { background-color: rgba(248, 113, 113, 0.66); }
      }
      .speed-focus-row {
        background-color: transparent;
      }
      .speed-column-pulse {
        animation: speed-column-pulse 1.1s ease-in-out infinite;
      }
      @keyframes speed-column-pulse {
        0%, 100% { box-shadow: inset 0 0 0 0 rgba(255, 193, 7, 0); }
        50% { box-shadow: inset 0 0 0 999px rgba(255, 193, 7, 0.22); }
      }

      .speed-target-main {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.5rem;
      }
      .speed-cell-pokemon { grid-row: 1; grid-column: 1 / span 1; }
      .speed-cell-forme { grid-row: 1; grid-column: 2 / span 1; }
      .speed-cell-edit { grid-row: 1; grid-column: 3 / span 1; }
      .speed-cell-toggle { grid-row: 1; grid-column: 4 / span 1; }
      .speed-cell-speed { grid-row: 2; grid-column: 1 / span 1; }
      .speed-cell-nature { grid-row: 2; grid-column: 2 / span 1; }
      .speed-cell-ap { grid-row: 2; grid-column: 3 / span 1; }
      .speed-cell-rank { grid-row: 2; grid-column: 4 / span 1; }

      .speed-target-main[data-edit-visible="0"] .speed-cell-pokemon {
        grid-column: span 4;
      }
      .speed-target-main[data-edit-visible="0"] .speed-cell-edit {
        display: none;
      }

      .speed-target-main[data-form-visible="0"] .speed-cell-forme {
        display: none;
      }

      .speed-target-main[data-form-visible="0"] .speed-cell-pokemon {
        grid-column: 1 / span 2;
      }

      :root {
        --speed-ui-border: #dbe3ed;
      }

      .speed-target-main .btn,
      .speed-target-main .form-select,
      .speed-target-main .input-group-text,
      #target-search-scope .btn,
      #target-search-input {
        border-color: var(--speed-ui-border) !important;
      }

      .speed-target-control-btn,
      .speed-target-main .input-group,
      .speed-target-main .form-select {
        min-height: 42px;
      }

      .speed-target-main .input-group-text {
        min-width: 40px;
        justify-content: center;
      }

      .speed-target-picker {
        justify-content: center;
        gap: 0.4rem;
        height: 42px;
        min-height: 42px;
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
        overflow: hidden;
      }
      .speed-target-picker-icon-wrap {
        width: 32px;
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 32px;
      }
      .speed-target-picker-icon-wrap .ps-pokemon-icon {
        width: 32px;
        height: 32px;
        max-height: none;
        object-fit: contain;
      }
      .speed-target-picker-icon-wrap .pokemon-icon-fallback {
        width: 32px;
        height: 32px;
        font-size: 0.8rem;
      }
      .speed-target-picker-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .speed-target-picker .ps-pokemon-icon {
        width: 32px;
        height: 32px;
        object-fit: contain;
        flex: 0 0 32px;
      }

      .speed-target-picker-head-icon {
        color: #6b7280;
        flex: 0 0 auto;
      }

      .speed-target-speed-box {
        height: 42px;
        border: 0;
        border-radius: 0;
        background: transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        width: 100%;
      }
      .speed-target-speed-box .bi {
        color: #6b7280;
      }

      .speed-target-main .input-group-text .bi,
      .speed-target-control-btn .bi {
        color: #6b7280;
      }

      #target-nature-cycle.mode-plus {
        background: #d1fae5;
        border-color: #10b981;
        color: #065f46;
      }
      #target-nature-cycle.mode-neutral {
        background: #fff;
        border-color: var(--bs-border-color);
        color: var(--bs-body-color);
      }
      #target-nature-cycle.mode-minus {
        background: #fee2e2;
        border-color: #ef4444;
        color: #7f1d1d;
      }

      .speed-forme-select {
        min-height: 42px;
      }

      .ps-item-icon {
        display: inline-block;
        width: 24px;
        height: 24px;
        background-repeat: no-repeat;
        background-size: 384px 1152px;
        image-rendering: pixelated;
        vertical-align: middle;
        flex: 0 0 24px;
      }

      .speed-scarf-label {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        white-space: nowrap;
      }

      .target-search-list {
        max-height: 56vh;
        overflow-y: auto;
      }

      .target-search-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }

      .target-search-item-main {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        min-width: 0;
      }

      .target-search-item-label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .target-search-item-sub {
        flex: 0 0 auto;
      }

      .speed-detail-embed-dialog {
        width: min(1120px, 96vw);
        max-width: min(1120px, 96vw);
        margin: 1rem auto;
      }

      .speed-detail-embed-dialog .modal-content {
        border: 0;
        border-radius: 0;
        overflow: hidden;
        background: transparent;
        box-shadow: none;
      }

      .speed-detail-embed-body {
        padding: 0;
        background: transparent;
      }

      .speed-detail-embed-frame {
        width: 100%;
        min-height: min(760px, calc(100vh - 7rem));
        height: min(760px, calc(100vh - 7rem));
        border: 0;
        background: transparent;
      }

      @media (max-width: 767.98px) {
        .speed-detail-embed-dialog {
          width: calc(100vw - 1rem);
          max-width: calc(100vw - 1rem);
          margin: 0.5rem auto;
          height: auto;
        }

        .speed-detail-embed-dialog .modal-content {
          border-radius: 0;
          height: auto;
        }

        .speed-detail-embed-frame {
          min-height: calc(100vh - 6rem);
          height: calc(100vh - 6rem);
        }
      }

      @media (max-width: 576px) {
        #target-forme-select,
        #target-scarf {
          font-size: 0.72rem;
          padding-left: 0.4rem;
          padding-right: 0.4rem;
          letter-spacing: 0;
        }
      }

      .ad-mobile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }
      .ad-bottom-wrap {
        display: flex;
        justify-content: center;
      }
      .ad-slot {
        border: 1px solid #d8dee6;
        border-radius: 8px;
        background: #fff;
        color: #7b8794;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
      }
      .ad-rail { min-height: 600px; }
      .ad-mobile-banner { min-height: 100px; }
      .ad-mobile-rect { min-height: 250px; }
      .ad-banner-desktop { min-height: 90px; width: min(100%, 728px); }
      .ad-banner-mobile { min-height: 100px; width: min(100%, 320px); }

      @media (max-width: 767.98px) {
        .speed-target-card .card-body {
          padding: 0.85rem 0.75rem;
        }

        .speed-target-main {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        #speed-table tbody td,
        #speed-table tbody td:first-child {
          font-size: 0.78rem;
        }

        #speed-table tbody td:first-child {
          width: 3.8rem;
          padding-left: 0.35rem;
          padding-right: 0.35rem;
        }

        .speed-group-stack {
          gap: 0.26rem;
        }

        .speed-group {
          gap: 0.28rem;
        }

        .speed-group-label {
          min-width: 4.35rem;
          padding: 0.25rem 0.38rem;
          font-size: 0.62rem;
        }

        .speed-chip-list {
          gap: 0.26rem 0.34rem;
          padding-right: 0.1rem;
          padding-bottom: 0.1rem;
        }

        .speed-pokemon-cell {
          width: 32px;
          height: 32px;
          min-width: 32px;
          flex-basis: 32px;
          border-radius: 0.55rem;
        }

        .speed-pokemon-cell .ps-pokemon-icon {
          width: 27px;
          height: 27px;
        }

        .speed-rule-badges .badge {
          padding: 0.08rem 0.13rem;
          font-size: 0.54rem;
        }

        .speed-pokemon-cell {
          margin-right: 0.06rem;
          margin-bottom: 0.06rem;
        }

        #target-spe-ap,
        #target-spe-rank {
          font-size: 0.76rem;
          padding-left: 0.35rem;
          padding-right: 1.35rem;
        }

        .speed-cell-ap .input-group-text,
        .speed-cell-rank .input-group-text {
          min-width: 30px;
          padding-left: 0.35rem;
          padding-right: 0.35rem;
          font-size: 0.76rem;
        }

        .speed-cell-pokemon { grid-row: 1; grid-column: 1 / span 2; }
        .speed-cell-forme { grid-row: 1; grid-column: 3 / span 2; }
        .speed-cell-edit { grid-row: 1; grid-column: 5 / span 1; }
        .speed-cell-toggle { grid-row: 1; grid-column: 6 / span 1; }
        .speed-cell-speed { grid-row: 2; grid-column: 1 / span 1; }
        .speed-cell-nature { grid-row: 2; grid-column: 2 / span 1; }
        .speed-cell-ap { grid-row: 2; grid-column: 3 / span 2; }
        .speed-cell-rank { grid-row: 2; grid-column: 5 / span 2; }

        .speed-target-main[data-form-visible="0"] .speed-cell-pokemon {
          grid-column: 1 / span 4;
        }

        .speed-target-main[data-form-visible="0"] .speed-cell-edit {
          grid-column: 5 / span 1;
        }

        .speed-target-main[data-form-visible="0"] .speed-cell-toggle {
          grid-column: 6 / span 1;
        }

        .ad-mobile-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 576px) {
        .speed-panel-title {
          font-size: 0.94rem;
        }

        #target-spe-ap,
        #target-spe-rank {
          font-size: 0.7rem;
          padding-left: 0.28rem;
          padding-right: 1.2rem;
        }

        .speed-cell-ap .input-group-text,
        .speed-cell-rank .input-group-text {
          min-width: 28px;
          padding-left: 0.25rem;
          padding-right: 0.25rem;
          font-size: 0.7rem;
        }

        #speed-table tbody td,
        #speed-table tbody td:first-child {
          font-size: 0.72rem;
        }

        #speed-table tbody td:first-child {
          width: 3.25rem;
        }
      }

      #speed-target-panel-col {
        position: fixed;
        left: 0;
        right: auto;
        bottom: 0;
        z-index: 1035;
        padding: 0;
      }

      @media (max-width: 991.98px) {
        #tool-footer {
          display: none !important;
        }

        #speed-target-panel-col {
          left: 0;
          right: 0;
          width: 100%;
        }

        .table-container {
          padding-bottom: calc(var(--speed-target-panel-height) + 0.4rem);
        }

        #speed-target-panel-col .panel-card,
        #speed-target-panel-col .panel-card > .card-header {
          border-radius: 0;
        }

        .speed-target-card {
          border-top: 1px solid rgba(148, 163, 184, 0.35);
          box-shadow: 0 -6px 20px rgba(15, 23, 42, 0.1);
          border-top-left-radius: 0;
          border-top-right-radius: 0;
          margin-top: 0;
        }

        .speed-target-card > .card-header {
          border-top-left-radius: 0;
          border-top-right-radius: 0;
        }

        #speed-list-panel-col {
          padding-bottom: 0.25rem;
        }

        .ad-bottom-wrap {
          display: none !important;
        }

        .speed-target-card .card-body {
          max-height: min(44vh, 15.5rem);
          overflow-y: auto;
          padding-bottom: calc(0.85rem + env(safe-area-inset-bottom, 0px));
        }
      }

    </style>
  </head>
  <body class="calc-page speed-adjust-page d-flex flex-column">
    <header class="calc-header py-2"><div class="container"></div></header>

    <main class="container-fluid py-3 px-3 px-xxl-4 main-content">
      <div class="row g-3 align-items-start calc-shell">
        <aside class="col-xxl-2 d-none d-xxl-block">
          <div class="ad-stack">
            <div class="ad-slot ad-rail" aria-label="left-ad-rail">AD 160x600</div>
          </div>
        </aside>

        <section class="col-12 col-xxl-8">
          <div class="row g-3 speed-panel-grid">
            <div id="speed-list-panel-col" class="col-12">
              <section class="card panel-card speed-list-panel">
                <div class="card-header d-flex justify-content-between align-items-center gap-2">
                  <div class="speed-panel-title">
                    <i class="bi bi-speedometer2" aria-hidden="true"></i>
                    <span>すばやさリスト</span>
                  </div>
                  <div class="speed-list-tools">
                    <input id="speed-search" class="form-control" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="ポケモン名で検索" aria-label="ポケモン名で検索">
                  </div>
                </div>
                <div class="card-body">
                  <div class="table-container">
                    <table class="table table-hover table-striped align-middle" id="speed-table">
                      <tbody id="speed-table-body"></tbody>
                    </table>
                  </div>
                </div>
              </section>
            </div>

            <div id="speed-target-panel-col" class="col-12">
              <section class="card panel-card speed-target-card" id="speed-target-panel">
                <div class="card-header d-flex justify-content-between align-items-center gap-2">
                  <div class="speed-panel-title">
                    <i class="bi bi-sliders2-vertical" aria-hidden="true"></i>
                    <span>調整対象</span>
                  </div>
                  <button id="speed-memo-btn" class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="tooltip" title="このステータスをメモ保存">
                    <i class="bi bi-bookmark" aria-hidden="true"></i>
                    <span>メモ</span>
                  </button>
                </div>
                <div class="card-body">
                  <div class="speed-target-main" data-edit-visible="1">
                    <div class="speed-cell-pokemon">
                      <button class="btn btn-outline-secondary w-100 speed-target-control-btn speed-target-picker" id="target-picker-trigger" type="button" data-bs-toggle="tooltip" data-i18n-title="targetPokemon" title="調整するポケモンを選択">
                        <span data-i18n="loadingTarget">調整対象を読み込み中...</span>
                      </button>
                    </div>

                    <div class="speed-cell-edit">
                      <button id="target-edit-detail" class="btn btn-outline-secondary w-100 speed-target-control-btn" type="button" data-bs-toggle="tooltip" data-i18n-title="editPokemon" title="詳細編集">
                        <i class="bi bi-pencil-square"></i>
                      </button>
                    </div>

                    <div class="speed-cell-toggle">
                      <button id="target-scarf" class="btn btn-outline-secondary w-100 speed-target-control-btn speed-scarf-toggle" type="button" data-bs-toggle="tooltip" data-i18n-title="scarf" title="こだわりスカーフ" aria-pressed="false"></button>
                    </div>

                    <div class="speed-cell-forme" id="target-forme-cell">
                      <div class="input-group speed-forme-group" data-bs-toggle="tooltip" data-i18n-title="targetForm" title="フォルム">
                        <span class="input-group-text"><i class="bi bi-stars"></i></span>
                        <select id="target-forme-select" class="form-select speed-forme-select" title="フォルム"></select>
                      </div>
                    </div>

                    <div class="speed-cell-speed">
                      <div class="speed-target-speed-box mono fw-bold" title="実数値" aria-label="実数値">
                        <i class="bi bi-speedometer2" aria-hidden="true"></i>
                        <span id="target-current-speed">-</span>
                      </div>
                    </div>

                    <div class="speed-cell-nature">
                      <button id="target-nature-cycle" class="btn btn-outline-secondary w-100 speed-target-control-btn" type="button" data-bs-toggle="tooltip" data-i18n-title="naturePlus" title="性格補正を切替">
                        <span id="target-nature-cycle-text">-</span>
                      </button>
                    </div>

                    <div class="speed-cell-ap">

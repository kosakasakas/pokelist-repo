<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>素早さ調整</title>
    <meta name="description" content="レギュレーション対応の素早さ調整ページです。">
    <link rel="shortcut icon" href="/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="preconnect" href="https://play.pokemonshowdown.com" crossorigin>
    <link rel="dns-prefetch" href="https://play.pokemonshowdown.com">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/poketools-custom-styles.css">
    <style>
      html, body {
        height: 100%;
        overflow: hidden; /* ページ全体のスクロールを禁止 */
      }
      .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .table-container {
        flex-grow: 1;
        overflow-y: auto; /* このコンテナがスクロールする */
      }
      #speed-table thead th {
        position: sticky;
        top: 0;
        z-index: 10;
      }
      @media (max-width: 576px) {
        th[data-i18n="speedValue"],
        th[data-i18n="groupList"] {
          font-size: 0.8rem;
          white-space: nowrap;
        }
      }
      .highlight-row {
        animation: highlight-animation 1.5s;
      }
      @keyframes highlight-animation {
        from { background-color: #aee2ff; }
        to { background-color: transparent; }
      }
      .speed-focus-row {
        background-color: rgba(255, 193, 7, 0.08);
      }
      .speed-column-pulse {
        animation: speed-column-pulse 1.1s ease-in-out infinite;
      }
      @keyframes speed-column-pulse {
        0%, 100% { box-shadow: inset 0 0 0 0 rgba(255, 193, 7, 0); }
        50% { box-shadow: inset 0 0 0 999px rgba(255, 193, 7, 0.22); }
      }

      .speed-target-main {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.5rem;
      }
      @media (min-width: 768px) {
        .speed-target-main {
          grid-template-columns: repeat(8, minmax(0, 1fr));
        }
      }

      .speed-cell-pokemon { grid-column: span 2; }
      .speed-cell-edit { grid-column: span 1; }
      .speed-cell-toggle { grid-column: span 1; }
      .speed-cell-forme { grid-column: span 2; }
      .speed-cell-speed { grid-column: span 1; }
      .speed-cell-nature { grid-column: span 1; }
      .speed-cell-ap { grid-column: span 2; }
      .speed-cell-rank { grid-column: span 2; }

      .speed-cell-pokemon { grid-row: 1; grid-column: 1 / span 2; }
      .speed-cell-forme { grid-row: 1; grid-column: 3 / span 2; }
      .speed-cell-edit { grid-row: 2; grid-column: 1 / span 1; }
      .speed-cell-toggle { grid-row: 2; grid-column: 2 / span 1; }
      .speed-cell-speed { grid-row: 2; grid-column: 3 / span 1; }
      .speed-cell-nature { grid-row: 2; grid-column: 4 / span 1; }
      .speed-cell-ap { grid-row: 3; grid-column: 1 / span 2; }
      .speed-cell-rank { grid-row: 3; grid-column: 3 / span 2; }
      .speed-cell-save { grid-column: span 4; }
      @media (min-width: 768px) {
        .speed-cell-pokemon { grid-row: 1; grid-column: 1 / span 2; }
        .speed-cell-forme { grid-row: 1; grid-column: 3 / span 2; }
        .speed-cell-edit { grid-row: 1; grid-column: 5 / span 2; }
        .speed-cell-toggle { grid-row: 1; grid-column: 7 / span 2; }
        .speed-cell-speed { grid-row: 2; grid-column: 1 / span 2; }
        .speed-cell-nature { grid-row: 2; grid-column: 3 / span 2; }
        .speed-cell-ap { grid-row: 2; grid-column: 5 / span 2; }
        .speed-cell-rank { grid-row: 2; grid-column: 7 / span 2; }
        .speed-cell-ap { grid-column: span 2; }
        .speed-cell-rank { grid-column: span 2; }
        .speed-cell-save { grid-column: span 2; }
      }

      .speed-target-main[data-edit-visible="0"] .speed-cell-pokemon {
        grid-column: span 4;
      }
      .speed-target-main[data-edit-visible="0"] .speed-cell-edit {
        display: none;
      }

      .speed-target-control-btn,
      .speed-target-main .input-group,
      .speed-target-main .form-select {
        min-height: 42px;
      }

      .speed-target-main .input-group-text {
        min-width: 40px;
        justify-content: center;
      }

      .speed-target-picker {
        justify-content: flex-start;
        gap: 0.4rem;
        height: 42px;
        min-height: 42px;
        padding-top: 0.25rem;
        padding-bottom: 0.25rem;
        overflow: hidden;
      }
      .speed-target-picker > span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .speed-target-picker .ps-pokemon-icon {
        width: 32px;
        height: 32px;
        object-fit: contain;
        flex: 0 0 32px;
      }

      .speed-target-speed-box {
        height: 42px;
        border: 1px solid var(--bs-border-color);
        border-radius: var(--bs-border-radius);
        background: var(--bs-body-bg);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        width: 100%;
      }
      .speed-target-speed-box .bi {
        color: #c68a00;
      }

      #target-nature-cycle.mode-plus {
        background: #d1fae5;
        border-color: #10b981;
        color: #065f46;
      }
      #target-nature-cycle.mode-neutral {
        background: #fff;
        border-color: var(--bs-border-color);
        color: var(--bs-body-color);
      }
      #target-nature-cycle.mode-minus {
        background: #fee2e2;
        border-color: #ef4444;
        color: #7f1d1d;
      }

      .speed-forme-select {
        min-height: 42px;
      }

      .ps-item-icon {
        display: inline-block;
        width: 24px;
        height: 24px;
        background-repeat: no-repeat;
        background-size: 384px 1152px;
        image-rendering: pixelated;
        vertical-align: middle;
        flex: 0 0 24px;
      }

      .speed-scarf-label {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        white-space: nowrap;
      }

      .target-search-list {
        max-height: 56vh;
        overflow-y: auto;
      }

      .target-search-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }

      .target-search-item-main {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        min-width: 0;
      }

      .target-search-item-label {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .target-search-item-sub {
        flex: 0 0 auto;
      }

      @media (max-width: 576px) {
        #target-forme-select,
        #target-scarf {
          font-size: 0.72rem;
          padding-left: 0.4rem;
          padding-right: 0.4rem;
          letter-spacing: 0;
        }
      }

      .ad-mobile-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }
      .ad-bottom-wrap {
        display: flex;
        justify-content: center;
      }
      .ad-slot {
        border: 1px solid #d8dee6;
        border-radius: 8px;
        background: #fff;
        color: #7b8794;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
      }
      .ad-rail { min-height: 600px; }
      .ad-mobile-banner { min-height: 100px; }
      .ad-mobile-rect { min-height: 250px; }
      .ad-banner-desktop { min-height: 90px; width: min(100%, 728px); }
      .ad-banner-mobile { min-height: 100px; width: min(100%, 320px); }

      @media (max-width: 767.98px) {
        .ad-mobile-grid {
          grid-template-columns: 1fr;
        }
      }

      .target-box-editor-host {
        position: fixed;
        inset: 0;
        z-index: 1200;
        background: rgba(15, 23, 42, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .target-box-editor-surface {
        width: min(1280px, 98vw);
        height: min(900px, 92vh);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 20px 50px rgba(2, 6, 23, 0.35);
        background: #fff;
      }
      .target-box-editor-frame {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      @media (max-width: 767.98px) {
        .target-box-editor-host {
          padding: 0.25rem;
        }
        .target-box-editor-surface {
          width: 100vw;
          height: 100vh;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body class="speed-adjust-page d-flex flex-column">
    <header class="calc-header py-2"><div class="container"></div></header>

    <main class="container-fluid py-3 px-3 px-xxl-4 main-content">
      <div class="row g-3 align-items-start calc-shell h-100">
        <aside class="col-xxl-2 d-none d-xxl-block">
          <div class="ad-stack">
            <div class="ad-slot ad-rail" aria-label="left-ad-rail">AD 160x600</div>
          </div>
        </aside>

        <section class="col-12 col-xxl-8 d-flex flex-column h-100">
          <section class="speed-filter-bar mb-2 bg-light py-2">
            <div class="row g-2 align-items-end">
              <div class="col-12">
                <input id="speed-search" class="form-control" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="ポケモン名で検索">
              </div>
            </div>
          </section>

          <div class="table-container">
            <table class="table table-hover table-striped align-middle" id="speed-table">
              <thead>
                <tr>
                  <th scope="col" data-i18n="speedValue" class="bg-light"><i class="bi bi-speedometer2"></i> 実数値</th>
                  <th scope="col" data-i18n="groupList" class="bg-light">対象群</th>
                </tr>
              </thead>
              <tbody id="speed-table-body"></tbody>
            </table>
          </div>
        </section>

        <aside class="col-xxl-2 d-none d-xxl-block">
          <div class="ad-stack">
            <div class="ad-slot ad-rail" aria-label="right-ad-rail">AD 160x600</div>
          </div>
        </aside>
      </div>
      <div class="ad-mobile-grid d-xxl-none mt-3">
        <div class="ad-slot ad-mobile-banner" aria-label="mobile-banner-320x100">AD 320x100</div>
        <div class="ad-slot ad-mobile-rect" aria-label="mobile-rect-300x250">AD 300x250</div>
      </div>
      <div class="ad-bottom-wrap mt-3">
        <div class="ad-slot ad-banner ad-banner-desktop d-none d-md-flex" aria-label="bottom-banner-728x90">AD 728x90</div>
        <div class="ad-slot ad-banner ad-banner-mobile d-md-none" aria-label="bottom-banner-320x100">AD 320x100</div>
      </div>
    </main>

    <aside class="speed-target-panel fixed-bottom bg-body-tertiary p-3 shadow-lg" id="speed-target-panel">
      <div class="speed-target-main container" data-edit-visible="1">
        <div class="speed-cell-pokemon">
          <button class="btn btn-outline-primary w-100 speed-target-control-btn speed-target-picker" id="target-picker-trigger" type="button" data-bs-toggle="tooltip" title="調整するポケモンを選択">
            <span data-i18n="loadingTarget">調整対象を読み込み中...</span>
          </button>
        </div>

        <div class="speed-cell-edit">
          <button id="target-edit-detail" class="btn btn-outline-secondary w-100 speed-target-control-btn" type="button" data-bs-toggle="tooltip" data-i18n-title="editPokemon" title="詳細編集">
            <i class="bi bi-pencil-square"></i>
          </button>
        </div>

        <div class="speed-cell-toggle">
          <button id="target-scarf" class="btn btn-outline-secondary w-100 speed-target-control-btn speed-scarf-toggle" type="button" data-bs-toggle="tooltip" data-i18n-title="scarf" title="こだわりスカーフ" aria-pressed="false"></button>
        </div>

        <div class="speed-cell-forme">
          <select id="target-forme-select" class="form-select speed-forme-select" title="フォルム"></select>
        </div>

        <div class="speed-cell-speed">
          <div class="speed-target-speed-box mono fw-bold" title="実数値" aria-label="実数値">
            <i class="bi bi-speedometer2" aria-hidden="true"></i>
            <span id="target-current-speed">-</span>
          </div>
        </div>

        <div class="speed-cell-nature">
          <button id="target-nature-cycle" class="btn btn-outline-secondary w-100 speed-target-control-btn" type="button" data-bs-toggle="tooltip" data-i18n-title="naturePlus" title="性格補正を切替">
            <span id="target-nature-cycle-text">±0%</span>
          </button>
        </div>

        <div class="speed-cell-ap">
          <div class="input-group" data-bs-toggle="tooltip" data-i18n-title="apLabel" title="能力ポイント">
            <span class="input-group-text"><i class="bi bi-lightning-charge"></i></span>
            <select id="target-spe-ap" class="form-select"></select>
          </div>
        </div>

        <div class="speed-cell-rank">
          <div class="input-group" data-bs-toggle="tooltip" data-i18n-title="rankLabel" title="ランク">
            <span class="input-group-text"><i class="bi bi-graph-up-arrow"></i></span>
            <select id="target-spe-rank" class="form-select"></select>
          </div>
        </div>

      </div>
    </aside>

    <div class="modal fade" id="target-search-modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" data-i18n="targetSearchTitle">対象ポケモンを検索</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="btn-group w-100 mb-2" role="group" id="target-search-scope">
              <button type="button" class="btn btn-outline-secondary active" data-scope="all" data-i18n="allList">全リスト</button>
              <button type="button" class="btn btn-outline-secondary" data-scope="box" data-i18n="boxList">ボックス</button>
              <button type="button" class="btn btn-outline-secondary" data-scope="party" data-i18n="partyList">パーティ</button>
            </div>
            <input id="target-search-input" class="form-control mb-2" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="ポケモン名で検索">
            <div id="target-search-list" class="target-search-list list-group"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="target-box-editor-host" class="target-box-editor-host d-none" aria-hidden="true">
      <div class="target-box-editor-surface">
        <iframe id="target-box-editor-frame" class="target-box-editor-frame" src="about:blank" title="ボックス編集"></iframe>
      </div>
    </div>

    <script src="/script-poketools-layout.js"></script>
    <script src="/script-ads.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="/script-speed-adjust-v2.js"></script>
  </body>
</html>
